<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Customer Churn Prediction</h1>

    <p>
        Enter the customer information below then click
        <strong>Predict</strong>.
    </p>

    <form action="/predict" method="POST">

        <div class="form-group">
            <label>Monthly Revenue</label>
            <input type="number" step="0.01" name="MonthlyRevenue" required>
        </div>

        <div class="form-group">
            <label>Monthly Minutes</label>
            <input type="number" step="0.01" name="MonthlyMinutes" required>
        </div>

        <div class="form-group">
            <label>Total Recurring Charge</label>
            <input type="number" step="0.01" name="TotalRecurringCharge" required>
        </div>

        <div class="form-group">
            <label>Overage Minutes</label>
            <input type="number" step="0.01" name="OverageMinutes" required>
        </div>

        <div class="form-group">
            <label>Dropped Calls</label>
            <input type="number" step="0.01" name="DroppedCalls" required>
        </div>

        <div class="form-group">
            <label>Customer Care Calls</label>
            <input type="number" step="0.01" name="CustomerCareCalls" required>
        </div>

        <div class="form-group">
            <label>CallForwardingCalls</label>
            <input type="number" step="0.01" name="CallForwardingCalls" required>
        </div>

        <button type="submit">
            Predict
        </button>

    </form>

</div>

</body>

</html>
