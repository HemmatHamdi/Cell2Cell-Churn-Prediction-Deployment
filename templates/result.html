<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Prediction Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Prediction Result</h1>

    <div class="result-box">

        <h2>{{ prediction }}</h2>

        <h3>Churn Probability</h3>

        <p>{{ probability }}%</p>

    </div>

    <a href="/">

        <button>
            Predict Another Customer
        </button>

    </a>

</div>

</body>

</html>
